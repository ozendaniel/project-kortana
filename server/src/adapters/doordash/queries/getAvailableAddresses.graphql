query getAvailableAddresses {
  getAvailableAddresses {
    ...DefaultAddressFragment
    __typename
  }
}

fragment DefaultAddressFragment on DefaultAddress {
  id
  addressId
  street
  city
  subpremise
  state
  zipCode
  country
  countryCode
  lat
  lng
  districtId
  manualLat
  manualLng
  timezone
  shortname
  printableAddress
  driverInstructions
  dropoffPreferences {
    allPreferences {
      optionId
      isDefault
      instructions
      __typename
    }
    __typename
  }
  buildingName
  entryCode
  addressLinkType
  personalAddressLabel {
    labelIcon
    labelName
    __typename
  }
  formattedAddressSegmentedList
  formattedAddressSegmentedNonUserEditableFieldsList
  __typename
}

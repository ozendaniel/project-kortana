# DoorDash GraphQL: detailedCartItems
# Captured from HAR: 2026-03-31T19:28:39.501Z
# Response status: 200
#
# Variables example:
# {
#   "orderCartId": "",
#   "isCardPayment": true
# }

query detailedCartItems($orderCartId: ID!, $corporateIndividualOrdersEnabled: Boolean, $deliveryOptionType: DeliveryOptionType, $isCardPayment: Boolean) {
  orderCart(
    id: $orderCartId
    corporateIndividualOrdersEnabled: $corporateIndividualOrdersEnabled
    deliveryOptionType: $deliveryOptionType
    isCardPayment: $isCardPayment
  ) {
    id
    ...InvalidItemsFragment
    subtotal
    isSameStoreCatering
    isConvenienceCart
    orders {
      id
      consumer {
        id
        firstName
        lastName
        localizedNames {
          informalName
          formalName
          formalNameAbbreviated
          __typename
        }
        __typename
      }
      isSubCartFinalized
      splitBillSubcartStatus
      lineItems {
        ...lineItemFragment
        __typename
      }
      paymentCard {
        id
        stripeId
        __typename
      }
      paymentLineItems {
        subtotal
        taxAmount
        subtotalTaxAmount
        feesTaxAmount
        serviceFee
        __typename
      }
      orderItems {
        __typename
        id
        cartItemStatusType
        options {
          id
          name
          quantity
          price
          nestedOptions
          __typename
        }
        nestedOptions
        specialInstructions
        substitutionPreference
        quantity
        singlePrice
        priceOfTotalQuantity
        nonDiscountPriceDisplayString
        priceDisplayString
        continuousQuantity
        unit
        purchaseType
        estimatedPricingDescription
        isPrescriptionItem
        increment {
          decimalPlaces
          unitAmount
          __typename
        }
        itemLevelDiscount {
          promoId
          promoCode
          externalCampaignId
          __typename
        }
        discounts {
          ...OrderItemDiscountFragment
          __typename
        }
        item {
          id
          restrictionInfo {
            type
            rulesList {
              ruleName
              intValue
              stringValue
              boolValue
              floatValue
              __typename
            }
            __typename
          }
          imageUrl
          name
          price
          minAgeRequirement
          category {
            title
            __typename
          }
          extras {
            id
            title
            description
            __typename
          }
          itemTagsList {
            tagType
            localizedName
            shortName
            id
            description
            displayType
            __typename
          }
          storeId
          businessId
          __typename
        }
        bundleStore {
          ...OrderItemBundleFragment
          __typename
        }
        giftInfo {
          ...CartItemGiftInfoFragment
          __typename
        }
        badges {
          ...BadgeFragment
          __typename
        }
        nudgeList {
          ...NudgeFragment
          __typename
        }
        promoNudgeList {
          ...PromoNudgeFragment
          __typename
        }
        itemLimitData {
          ...ItemLimitDataFragment
          __typename
        }
      }
      __typename
    }
    total
    totalBeforeDiscountsAndCredits
    footerDetails {
      title
      subtitle
      __typename
    }
    outOfStockMenuItemIds
    __typename
  }
}

fragment InvalidItemsFragment on OrderCart {

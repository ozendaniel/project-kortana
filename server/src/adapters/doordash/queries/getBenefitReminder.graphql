query getBenefitReminder($placementType: BenefitReminderPlacementTypeMap!, $cursor: String, $teamId: String) {
  getBenefitReminder(
    placementType: $placementType
    cursor: $cursor
    teamId: $teamId
  ) {
    reminderTitle
    type
    icon
    metadata {
      amount
      isDisplay
      tracking
      __typename
    }
    custom {
      isDashpass
      subtitle
      hasDismiss
      action {
        type
        title
        description
        buttonText
        __typename
      }
      __typename
    }
    __typename
  }
}

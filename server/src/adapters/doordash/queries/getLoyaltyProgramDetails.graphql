query getLoyaltyProgramDetails($storeId: ID!) {
  getLoyaltyProgramDetails(storeId: $storeId) {
    programId
    programExperience
    header {
      pageTitle
      merchantName
      __typename
    }
    programExplanation {
      title
      explanationText
      __typename
    }
    termsAndConditions {
      termsText
      __typename
    }
    footer {
      ctaAction
      ctaTitle
      __typename
    }
    omnichannelLoyaltyLinkingView {
      icon
      title
      description
      button {
        enabled
        enabledTitle
        disabledTitle
        __typename
      }
      modalContent {
        title
        body1
        body2
        footer
        button {
          enabled
          enabledTitle
          disabledTitle
          __typename
        }
        __typename
      }
      __typename
    }
    __typename
  }
}
